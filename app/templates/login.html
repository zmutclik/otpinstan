<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTPInstan Bridge — Login</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      background:#08090f; color:#e4e6f2; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; position:relative;
    }
    body::before,body::after{
      content:''; position:fixed; border-radius:50%;
      filter:blur(120px); opacity:.45; pointer-events:none; z-index:0;
    }
    body::before{
      width:600px;height:600px;
      background:radial-gradient(circle,#6c63ff 0%,transparent 70%);
      top:-200px;left:-150px;
      animation:floatA 12s ease-in-out infinite;
    }
    body::after{
      width:500px;height:500px;
      background:radial-gradient(circle,#00d9a5 0%,transparent 70%);
      bottom:-180px;right:-120px;
      animation:floatB 14s ease-in-out infinite;
    }
    @keyframes floatA{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,40px) scale(1.08)}66%{transform:translate(-20px,-30px) scale(.94)}}
    @keyframes floatB{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-50px,-30px) scale(1.05)}66%{transform:translate(30px,50px) scale(.92)}}
    .grid-overlay{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
      background-size:60px 60px;
      mask-image:radial-gradient(ellipse 60% 50% at 50% 40%,black 30%,transparent 70%);
    }
    .login-wrapper{position:relative;z-index:1;width:100%;max-width:400px;padding:0 20px;}
    .login-card{
      background:linear-gradient(135deg,rgba(22,23,36,.95) 0%,rgba(18,19,30,.98) 100%);
      border:1px solid rgba(255,255,255,.07); border-radius:20px;
      padding:40px 32px; backdrop-filter:blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 25px 60px -15px rgba(0,0,0,.5),
        0 0 80px -20px rgba(108,99,255,.08);
    }
    .logo-mark{
      width:52px;height:52px;
      background:linear-gradient(135deg,#6c63ff 0%,#8b83ff 100%);
      border-radius:16px; display:flex; align-items:center; justify-content:center;
      margin:0 auto 16px; font-size:26px; font-weight:800; color:#fff;
      box-shadow:0 12px 30px -8px rgba(108,99,255,.35); position:relative;
    }
    .brand-name{font-size:1.35rem;font-weight:700;color:#fff;text-align:center;}
    .brand-sub{font-size:.78rem;color:#6b7280;text-align:center;margin-top:2px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:.75rem;font-weight:600;color:#9ca3af;margin-bottom:6px;text-transform:uppercase;}
    .form-input{
      width:100%; background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08); color:#e4e6f2;
      border-radius:10px; padding:11px 14px; font-size:.9rem;
      font-family:'Inter',system-ui,sans-serif; outline:none; transition:all .2s ease;
    }
    .form-input::placeholder{color:#4b5563}
    .form-input:focus{
      border-color:#6c63ff; background:rgba(108,99,255,.04);
      box-shadow:0 0 0 3px rgba(108,99,255,.1);
    }
    .btn-login{
      width:100%; background:linear-gradient(135deg,#6c63ff 0%,#5a52e0 100%);
      color:#fff; border:none; border-radius:10px; padding:12px;
      font-size:.9rem; font-weight:600; font-family:'Inter',system-ui,sans-serif;
      cursor:pointer; margin-top:8px; transition:all .2s ease;
    }
    .btn-login:hover{
      background:linear-gradient(135deg,#7b73ff 0%,#6c63ff 100%);
      box-shadow:0 8px 25px -6px rgba(108,99,255,.45); transform:translateY(-1px);
    }
    .btn-login:active{transform:translateY(0) scale(.98);}
    .login-footer{text-align:center;margin-top:20px;font-size:.72rem;color:#4b5563;}
    .login-footer code{
      color:#8b83ff; background:rgba(108,99,255,.08);
      padding:3px 8px; border-radius:5px;
      font-family:'SF Mono','Fira Code',monospace; font-size:.7rem;
    }
    .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);margin:20px 0;}
    .alert-error{
      color:#ff5c5c;font-size:.8rem;margin-bottom:16px;
      background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.15);
      padding:10px 14px;border-radius:10px;font-weight:500;
      display:flex;align-items:center;gap:8px;
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-mark">O</div>
      <div class="brand-name">OTPInstan Bridge</div>
      <div class="brand-sub">Masuk sebagai <strong>{{ username }}</strong></div>
      <p style="text-align:center;font-size:.7rem;color:#6b7280;margin-top:4px;">
        Password default: <code>123456</code>
      </p>
      <div class="divider"></div>

      {% if error %}
      <div class="alert-error">
        <span>!!</span> {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/{{ username }}/login">
        <input type="hidden" name="username" value="{{ username }}">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password"
                 placeholder="Masukkan password" autocomplete="current-password" />
        </div>
        <button class="btn-login" type="submit">Masuk &rarr;</button>
      </form>
      <div class="login-footer">
        URL: <code>http://192.168.80.10:8032/{{ username }}/</code>
      </div>
    </div>
  </div>
</body>
</html>
